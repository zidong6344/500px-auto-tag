<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      color: #ff6900;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    select, input {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #ff6900;
    }
    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      background: linear-gradient(135deg, #ff6900 0%, #ff8c00 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: linear-gradient(135deg, #e55d00 0%, #ff6900 100%); }
    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .status.success { display: block; background: #0a3d2a; color: #00d4aa; }
    .status.error { display: block; background: #3d0a0a; color: #ff6b6b; }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    .lang-group {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .lang-group label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      padding: 8px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #e0e0e0;
    }
    .lang-group input[type="radio"] { display: none; }
    .lang-group input[type="radio"]:checked + span {
      color: #ff6900;
    }
    .lang-group label:has(input:checked) {
      border-color: #ff6900;
      background: #2a1a0a;
    }
    .model-info {
      margin-top: 8px;
      padding: 8px 10px;
      background: #16213e;
      border-radius: 6px;
      font-size: 11px;
      color: #888;
    }
    .model-info strong { color: #ff6900; }
  </style>
</head>
<body>
  <h1>📸 500px Auto Tag</h1>
  <p class="subtitle">Ollama Qwen3-VL 本地生成标题和关键词</p>

  <label for="model">模型</label>
  <select id="model">
    <option value="">加载中...</option>
  </select>
  <div class="model-info" id="modelInfo">
    正在从 Ollama 获取本地模型列表...
  </div>

  <label for="apiKey">Ollama API Key（本地留空即可）</label>
  <input type="password" id="apiKey" placeholder="本地部署无需填写" />
  <p class="hint">使用本地 Ollama 可留空，远程需填写</p>

  <label>生成语言</label>
  <div class="lang-group">
    <label>
      <input type="radio" name="lang" value="en" />
      <span>🇬🇧 English</span>
    </label>
    <label>
      <input type="radio" name="lang" value="zh" checked />
      <span>🇨🇳 中文</span>
    </label>
  </div>

  <label for="keywordCount">关键词数量</label>
  <select id="keywordCount">
    <option value="10">10 个</option>
    <option value="15">15 个</option>
    <option value="20">20 个</option>
    <option value="30">30 个</option>
    <option value="35" selected>35 个（500px 上限）</option>
  </select>

  <label for="defaultLocation">默认拍摄地点</label>
  <input type="text" id="defaultLocation" placeholder="如：北京、上海、广东省" />
  <p class="hint">支持：北京/上海/天津/重庆/香港/澳门 或 省份名（如广东省、浙江省）</p>

  <button class="btn" id="save">保存设置</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
