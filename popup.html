<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      color: #ff6900;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    select, input {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #ff6900;
    }
    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      background: linear-gradient(135deg, #ff6900 0%, #ff8c00 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: linear-gradient(135deg, #e55d00 0%, #ff6900 100%); }
    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .status.success { display: block; background: #0a3d2a; color: #00d4aa; }
    .status.error { display: block; background: #3d0a0a; color: #ff6b6b; }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    .lang-group {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .lang-group label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      padding: 8px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #e0e0e0;
    }
    .lang-group input[type="radio"] { display: none; }
    .lang-group input[type="radio"]:checked + span {
      color: #ff6900;
    }
    .lang-group label:has(input:checked) {
      border-color: #ff6900;
      background: #2a1a0a;
    }
    .provider-group {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .provider-group label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #e0e0e0;
    }
    .provider-group input[type="radio"] { display: none; }
    .provider-group input[type="radio"]:checked + span {
      color: #ff6900;
    }
    .provider-group label:has(input:checked) {
      border-color: #ff6900;
      background: #2a1a0a;
    }
    .provider-icon {
      font-size: 16px;
    }
    .section-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 14px 0;
    }
    .volc-section { display: none; }
    .ollama-section { display: none; }
    .section-visible { display: block; }
    .info-box {
      margin-top: 8px;
      padding: 8px 10px;
      background: #16213e;
      border-radius: 6px;
      font-size: 11px;
      color: #888;
    }
    .info-box strong { color: #ff6900; }
    .link {
      color: #ff6900;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>📸 500px Auto Tag</h1>
  <p class="subtitle">AI 图片标题和关键词自动生成</p>

  <label>AI 服务</label>
  <div class="provider-group">
    <label>
      <input type="radio" name="provider" value="volcengine" checked />
      <span class="provider-icon">🔥</span>
      <span>火山引擎豆包</span>
    </label>
    <label>
      <input type="radio" name="provider" value="ollama" />
      <span class="provider-icon">🦙</span>
      <span>Ollama 本地</span>
    </label>
  </div>

  <!-- 火山引擎配置 -->
  <div class="volc-section section-visible" id="volcSection">
    <div class="section-divider"></div>

    <label for="apiKey">火山引擎 API Key</label>
    <input type="password" id="apiKey" placeholder="在方舟平台获取 API Key" />
    <p class="hint">获取方式：火山引擎方舟平台 → <a class="link" href="https://console.volcengine.com/ark" target="_blank">ark.cn-beijing.volces.com</a> → 创建接入点 → 复制 Key</p>

    <label for="volcModel">模型 Endpoint ID</label>
    <input type="text" id="volcModel" placeholder="如：ep-20241028-xxxxx（在方舟平台创建推理接入点后获得）" />
    <p class="hint">推荐 Doubao-Seed-1.6-flash（快·便宜），在方舟平台创建推理接入点 → 复制 Endpoint ID 填入此处</p>

    <div class="info-box">
      <strong>豆包视觉模型</strong>：中文理解能力极佳，图库标题质量高，速度快（约2-5秒/张）<br/>
      费用：约 0.01-0.03 元/张，新用户有免费额度
    </div>
  </div>

  <!-- Ollama 配置 -->
  <div class="ollama-section" id="ollamaSection">
    <div class="section-divider"></div>

    <label for="model">Ollama 模型</label>
    <select id="model">
      <option value="">加载中...</option>
    </select>
    <div class="info-box" id="modelInfo">
      正在从 Ollama 获取本地模型列表...
    </div>

    <label for="ollamaApiKey">Ollama API Key（本地留空）</label>
    <input type="password" id="ollamaApiKey" placeholder="本地部署无需填写" />
  </div>

  <div class="section-divider"></div>

  <label>生成语言</label>
  <div class="lang-group">
    <label>
      <input type="radio" name="lang" value="en" />
      <span>🇬🇧 English</span>
    </label>
    <label>
      <input type="radio" name="lang" value="zh" checked />
      <span>🇨🇳 中文</span>
    </label>
  </div>

  <label for="keywordCount">关键词数量</label>
  <select id="keywordCount">
    <option value="10">10 个</option>
    <option value="15">15 个</option>
    <option value="20">20 个</option>
    <option value="30">30 个</option>
    <option value="35" selected>35 个（500px 上限）</option>
  </select>

  <label for="defaultLocation">默认拍摄地点</label>
  <input type="text" id="defaultLocation" placeholder="如：北京、上海、广东省" />
  <p class="hint">支持：北京/上海/天津/重庆/香港/澳门 或 省份名</p>

  <label for="defaultKeywords">默认关键词</label>
  <input type="text" id="defaultKeywords" placeholder="如：视觉中国,商业摄影,版权图片" />
  <p class="hint">每张图都会追加这些关键词，逗号分隔</p>

  <button class="btn" id="save">保存设置</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
